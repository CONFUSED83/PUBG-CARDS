<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG CARDS - Browse Trades</title>
    <link rel="stylesheet" href="shared-style.css">
    <style>
        .page-wrap { padding: 60px 16px 40px; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,15,26,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .top-bar-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .top-bar-brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.125rem; background: linear-gradient(135deg, var(--gold), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .guest-badge { font-size: 0.5625rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); background: var(--surface); padding: 3px 8px; border-radius: 6px; }

        .hero { text-align: center; margin-bottom: 24px; }
        .hero h1 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.5rem; margin-bottom: 8px; }
        .hero p { color: var(--text-dim); font-size: 0.8125rem; }

        .trade-list { display: flex; flex-direction: column; gap: 10px; }
        .trade-item { padding: 14px; cursor: pointer; transition: border-color 0.2s; }
        .trade-item:hover { border-color: rgba(0,212,170,0.3); }
        .trade-item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .trade-item-type { font-size: 0.5625rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
        .trade-item-time { font-size: 0.625rem; color: var(--text-dim); }

        .login-popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .login-popup-overlay.active { display: flex; }
        .login-popup { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; max-width: 360px; width: 100%; text-align: center; }
        .login-popup h3 { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.25rem; margin-bottom: 8px; }
        .login-popup p { color: var(--text-dim); font-size: 0.8125rem; margin-bottom: 20px; }

        .footer-cta { text-align: center; padding: 40px 20px; }
        .footer-cta p { color: var(--text-dim); font-size: 0.8125rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <span class="top-bar-brand">PUBG CARDS</span>
            <span class="guest-badge">Guest Mode</span>
        </div>
    </div>

    <div id="app">
        <div class="app-loading"><div class="loading-bars"><span></span><span></span><span></span><span></span><span></span></div></div>
    </div>

    <div class="login-popup-overlay" id="loginPopup">
        <div class="login-popup">
            <div style="width:50px;height:50px;border-radius:50%;background:rgba(240,192,64,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gold);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h3>Login Required</h3>
            <p>You need an account to trade cards. Login or create a free account to start trading!</p>
            <div style="display:flex;flex-direction:column;gap:8px;">
                <a href="./login.html" class="btn btn-teal btn-full" style="text-decoration:none;">Login</a>
                <a href="./create-account.html" class="btn btn-outline btn-full" style="text-decoration:none;">Create Account</a>
                <button class="btn btn-outline btn-full" onclick="closePopup()" style="color:var(--text-dim);">Continue Browsing</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app-data.js?v=39"></script>
    <script src="shared-components.js?v=39"></script>
    <script>
    (async function() {
        try {
            while (typeof initApp !== 'function') await new Promise(r => setTimeout(r, 10));
            await initApp();
        } catch(e) {
            console.error('Init failed:', e);
            document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">Failed to load</div>';
            return;
        }

        async function render() {
            // Fetch recent trades from Supabase (anonymized)
            let trades = [];
            if (sb) {
                const { data } = await sb.from('trades').select('*')
                    .in('status', ['pending', 'accepted'])
                    .order('created_at', { ascending: false })
                    .limit(20);
                trades = data || [];
            }

            // Also fetch some "available" cards (cards that multiple users have extras of)
            let availableCards = [];
            if (sb) {
                const { data } = await sb.from('user_cards').select('card_id, quantity')
                    .gte('quantity', 2);
                if (data) {
                    const cardCounts = {};
                    data.forEach(uc => { cardCounts[uc.card_id] = (cardCounts[uc.card_id] || 0) + 1; });
                    availableCards = Object.entries(cardCounts)
                        .filter(([_, count]) => count >= 1)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 20)
                        .map(([cardId, count]) => ({ card: getCardById(cardId), traders: count }));
                }
            }

            let html = `
            <div class="page-wrap">
                <div class="hero">
                    <h1>Browse Available Trades</h1>
                    <p>See what cards are available for trading. Login to start trading!</p>
                </div>`;

            if (availableCards.length > 0) {
                html += `
                <div style="margin-bottom:20px;">
                    <div class="section-title"><div class="section-title-bar"></div><h3>Available For Trade</h3></div>
                    <div class="trade-list">`;

                for (const ac of availableCards) {
                    if (!ac.card) continue;
                    const cardImg = getCardImageUrl(ac.card);
                    html += `
                    <div class="glass-sm trade-item" onclick="showLoginPopup()">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div class="card-placeholder card-${ac.card.type.toLowerCase()}" style="width:40px;border-radius:8px;overflow:hidden;flex-shrink:0;">
                                ${cardImg ? '<img src="' + cardImg + '" style="width:100%;height:auto;display:block;" onerror="this.style.display=\'none\'">' : ''}
                            </div>
                            <div style="flex:1;">
                                <div style="font-weight:600;font-size:0.875rem;">${ac.card.card_name}</div>
                                <div style="font-size:0.6875rem;color:var(--text-dim);">${ac.traders} trader${ac.traders > 1 ? 's' : ''} available</div>
                            </div>
                            <span class="trade-item-type badge-${ac.card.type.toLowerCase()}">${ac.card.type}</span>
                        </div>
                    </div>`;
                }
                html += '</div></div>';
            }

            if (trades.length > 0) {
                html += `
                <div style="margin-bottom:20px;">
                    <div class="section-title"><div class="section-title-bar" style="background:var(--gold);"></div><h3>Recent Trades</h3></div>
                    <div class="trade-list">`;

                for (const t of trades) {
                    const reqCard = getCardById(t.requester_card_id);
                    const recCard = getCardById(t.receiver_card_id);
                    if (!reqCard || !recCard) continue;
                    const reqImg = getCardImageUrl(reqCard);
                    const recImg = getCardImageUrl(recCard);

                    html += `
                    <div class="glass-sm trade-item" onclick="showLoginPopup()">
                        <div class="trade-item-top">
                            <span class="trade-item-type status-${t.status}">${t.status}</span>
                            <span class="trade-item-time">${timeAgo(t.created_at)}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="text-align:center;flex:1;">
                                <div class="card-placeholder card-${reqCard.type.toLowerCase()}" style="width:50px;margin:0 auto;border-radius:8px;overflow:hidden;">
                                    ${reqImg ? '<img src="' + reqImg + '" style="width:100%;height:auto;display:block;" onerror="this.style.display=\'none\'">' : ''}
                                </div>
                                <div style="font-size:0.625rem;color:var(--text-dim);margin-top:4px;">${reqCard.card_name}</div>
                            </div>
                            <div style="color:var(--teal);flex-shrink:0;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/></svg>
                            </div>
                            <div style="text-align:center;flex:1;">
                                <div class="card-placeholder card-${recCard.type.toLowerCase()}" style="width:50px;margin:0 auto;border-radius:8px;overflow:hidden;">
                                    ${recImg ? '<img src="' + recImg + '" style="width:100%;height:auto;display:block;" onerror="this.style.display=\'none\'">' : ''}
                                </div>
                                <div style="font-size:0.625rem;color:var(--text-dim);margin-top:4px;">${recCard.card_name}</div>
                            </div>
                        </div>
                    </div>`;
                }
                html += '</div></div>';
            }

            if (availableCards.length === 0 && trades.length === 0) {
                html += '<div class="empty-state"><p>No trades available yet. Be the first to trade!</p></div>';
            }

            html += `
                <div class="footer-cta">
                    <p>Want to trade? Create a free account!</p>
                    <a href="./create-account.html" class="btn btn-teal" style="text-decoration:none;">Create Account</a>
                    <p style="margin-top:12px;">Already have an account? <a href="./login.html">Login</a></p>
                </div>
            </div>`;

            document.getElementById('app').innerHTML = html;
        }

        window.showLoginPopup = function() {
            document.getElementById('loginPopup').classList.add('active');
        };

        window.closePopup = function() {
            document.getElementById('loginPopup').classList.remove('active');
        };

        document.getElementById('loginPopup').addEventListener('click', (e) => {
            if (e.target === document.getElementById('loginPopup')) closePopup();
        });

        render();
    })();
    </script>
</body>
</html>
