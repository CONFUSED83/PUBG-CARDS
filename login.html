<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Cards - Login</title>
    <link rel="stylesheet" href="shared-style.css">
    <style>
        .login-wrapper {
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px; position: relative; z-index: 1;
        }
        .brand-header { text-align: center; margin-bottom: 40px; }
        .brand-title {
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 2.25rem; letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--gold), var(--teal));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(240, 192, 64, 0.3));
        }
        .brand-sub {
            font-family: 'Rajdhani', sans-serif; font-weight: 500;
            font-size: 0.6875rem; letter-spacing: 0.3em;
            text-transform: uppercase; color: var(--text-dim); margin-top: 4px;
        }
        .login-card { width: 100%; max-width: 400px; padding: 36px 28px; }
        .login-card h2 {
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 1.5rem; text-align: center; margin-bottom: 4px;
        }
        .login-card .subtitle {
            text-align: center; color: var(--text-muted);
            font-size: 0.8125rem; margin-bottom: 28px;
        }
        .form-footer {
            text-align: center; margin-top: 20px;
            font-size: 0.8125rem; color: var(--text-muted);
        }
        .form-footer a { font-weight: 600; }
        .btn-login { margin-top: 8px; font-size: 1rem; padding: 16px; }

        .input-row { position: relative; margin-bottom: 20px; }
        .input-row label {
            display: block; font-family: 'Rajdhani', sans-serif; font-weight: 600;
            font-size: 0.6875rem; letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--text-muted); margin-bottom: 8px; padding-left: 4px;
        }
        .input-row input {
            width: 100%; background: rgba(13, 15, 26, 0.8);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 14px 14px 14px 44px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 0.9375rem;
            outline: none; transition: all 0.2s;
        }
        .input-row input:focus {
            border-color: rgba(0, 212, 170, 0.4);
            box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.08);
        }
        .input-row input::placeholder { color: var(--text-dim); }
        .input-icon-wrap {
            position: absolute; left: 14px; top: 36px;
            display: flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; color: var(--text-dim);
            pointer-events: none; transition: color 0.2s;
        }
        .input-row:focus-within .input-icon-wrap { color: var(--teal); }
        .input-icon-wrap svg { width: 18px; height: 18px; }

        .pw-toggle {
            position: absolute; right: 14px; top: 36px;
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; padding: 2px; display: flex;
            align-items: center; transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--text); }
        .pw-toggle svg { width: 18px; height: 18px; }

        .bg-float {
            position: fixed; border-radius: 16px;
            border: 1px solid rgba(240, 192, 64, 0.06);
            pointer-events: none; opacity: 0.3;
        }
        .bg-float-1 {
            width: 200px; height: 300px; top: 10%; left: -5%;
            transform: rotate(12deg); background: rgba(26, 29, 46, 0.3);
        }
        .bg-float-2 {
            width: 240px; height: 360px; bottom: -5%; right: 5%;
            transform: rotate(-6deg); background: rgba(26, 29, 46, 0.2);
            border-color: rgba(0, 212, 170, 0.06);
        }
        .app-loading {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-loading"><div class="loading-bars"><span></span><span></span><span></span><span></span><span></span></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app-data.js?v=38"></script>
    <script src="shared-components.js"></script>
    <script>
    (async function() {
        try {
            while (typeof initApp !== 'function') await new Promise(r => setTimeout(r, 10));
            await initApp();
        } catch(e) {
            console.error('Init failed:', e);
            document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);"><p>Failed to load.</p><button class="btn btn-teal btn-sm" onclick="location.reload()" style="margin-top:12px;">Refresh</button></div>';
            return;
        }

        document.getElementById('app').innerHTML = `
        <div class="bg-float bg-float-1"></div>
        <div class="bg-float bg-float-2"></div>
        <div class="login-wrapper">
            <header class="brand-header">
                <h1 class="brand-title">PUBG CARDS</h1>
                <p class="brand-sub">Trade Smart. Collect More.</p>
            </header>
            <div class="glass login-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to your collection</p>
                <form id="loginForm" onsubmit="return false;">
                    <div class="input-row">
                        <label for="username">Username</label>
                        <div class="input-icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                    </div>
                    <div class="input-row">
                        <label for="password">Password</label>
                        <div class="input-icon-wrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="pw-toggle" id="pwToggle">
                            <svg id="pwEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg id="pwEyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full btn-login" id="loginBtn">LOGIN</button>
                </form>
                <div style="display:flex;gap:8px;margin-top:14px;">
                    <a href="./guest.html" class="btn btn-outline btn-sm" style="flex:1;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        Guest
                    </a>
                    <a href="./create-account.html" class="btn btn-outline btn-sm" style="flex:1;text-decoration:none;">
                        Create Account
                    </a>
                </div>
            </div>
        </div>`;

        window.togglePw = function() {
            const inp = document.getElementById('password');
            const open = document.getElementById('pwEyeOpen');
            const closed = document.getElementById('pwEyeClosed');
            if (inp.type === 'password') {
                inp.type = 'text';
                open.style.display = 'none';
                closed.style.display = 'block';
            } else {
                inp.type = 'password';
                open.style.display = 'block';
                closed.style.display = 'none';
            }
        };

        document.getElementById('pwToggle').addEventListener('click', window.togglePw);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showToast('Please fill in all fields', 'error');
                return;
            }

            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                const result = await loginUser(username, password);
                if (result.success) {
                    showToast('Welcome back!', 'success');
                    setTimeout(async () => {
                        if (!await hasCompletedSetup(result.user.username)) {
                            window.location.href = './card-setup.html';
                        } else {
                            window.location.href = './home.html';
                        }
                    }, 400);
                } else {
                    showToast(result.error, 'error');
                    btn.innerHTML = 'LOGIN';
                    btn.disabled = false;
                }
            } catch (err) {
                showToast('Login failed. Try again.', 'error');
                btn.innerHTML = 'LOGIN';
                btn.disabled = false;
            }
        });

        if (getCurrentUser()) {
            window.location.href = './home.html';
        }
    })();
    </script>
</body>
</html>
