<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Cards - Messages</title>
    <link rel="stylesheet" href="shared-style.css">
    <style>
        .bottom-nav { display: none !important; }
        .page-wrap { padding: 60px 16px 20px; max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(13,15,26,0.9); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
        .top-bar-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; }
        .top-bar-brand { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.125rem; background: linear-gradient(135deg, var(--gold), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .back-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 6px; }
        .back-btn:hover { color: var(--text); }

        .chat-item { display: flex; align-items: center; gap: 12px; padding: 14px; margin-bottom: 2px; cursor: pointer; border-radius: 12px; transition: background 0.2s; }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--teal)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: var(--bg); flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; font-size: 0.9375rem; margin-bottom: 2px; }
        .chat-preview { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 0.625rem; color: var(--text-dim); flex-shrink: 0; }
        .chat-unread { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }

        .new-chat-btn { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--teal); color: var(--bg); border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,212,170,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; }
        .new-chat-btn:hover { transform: scale(1.05); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <button class="back-btn" id="backBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </button>
            <span class="top-bar-brand">MESSAGES</span>
            <div style="width:28px;"></div>
        </div>
    </div>

    <div id="app">
        <div class="app-loading"><div class="loading-bars"><span></span><span></span><span></span><span></span><span></span></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app-data.js?v=CLEAN164721"></script>
    <script src="shared-components.js?v=39"></script>
    <script>
    (async function() {
        try {
            while (typeof initApp !== 'function') await new Promise(r => setTimeout(r, 10));
            await initApp();
        } catch(e) {
            console.error('Init failed:', e);
            document.getElementById('app').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);"><p>Failed to load.</p><button class="btn btn-teal btn-sm" onclick="location.reload()" style="margin-top:12px;">Refresh</button></div>';
            return;
        }

        const user = requireAuth();
        if (!user) return;

        document.getElementById('backBtn').addEventListener('click', () => navigateTo('home'));

        async function render() {
            const conversations = await getConversations(user.username);
            const deleted = JSON.parse(localStorage.getItem('cth_deleted_chats_' + user.username) || '[]');
            
            // Show conversations that are NOT deleted, OR have unread messages from other user
            const visibleConversations = [];
            for (const conv of conversations) {
                if (!deleted.includes(conv.id)) {
                    visibleConversations.push(conv);
                    continue;
                }
                // Check if there are unread messages from the other user
                if (sb) {
                    const { count } = await sb.from('messages').select('*', { count: 'exact', head: true })
                        .eq('conversation_id', conv.id)
                        .neq('sender', user.username)
                        .eq('is_read', false);
                    if (count > 0) {
                        // Clear deleted flag and show the conversation
                        const key = 'cth_deleted_chats_' + user.username;
                        const updatedDeleted = deleted.filter(id => id !== conv.id);
                        localStorage.setItem(key, JSON.stringify(updatedDeleted));
                        visibleConversations.push(conv);
                    }
                }
            }
            
            let html = '<div class="page-wrap"><div style="margin-bottom:16px;"><h2 style="font-family:Rajdhani,sans-serif;font-weight:700;font-size:1.75rem;">Messages</h2><p style="color:var(--text-dim);font-size:0.8125rem;">Your conversations</p></div>';

            if (visibleConversations.length === 0) {
                html += '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.3;margin-bottom:12px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>No conversations yet</p><p style="font-size:0.75rem;margin-top:4px;">Start chatting by trading with other users</p></div>';
            } else {
                for (const conv of visibleConversations) {
                    const otherUser = conv.user1 === user.username ? conv.user2 : conv.user1;
                    const displayName = otherUser === 'CatLover78' ? 'Admin' : otherUser;
                    
                    // Check for unread messages
                    let unreadCount = 0;
                    if (sb) {
                        const { count } = await sb.from('messages').select('*', { count: 'exact', head: true })
                            .eq('conversation_id', conv.id)
                            .neq('sender', user.username)
                            .eq('is_read', false);
                        unreadCount = count || 0;
                    }
                    
                    html += `
                    <div class="chat-item" data-chat="${conv.id}|${otherUser}" style="${unreadCount > 0 ? 'background:rgba(0,212,170,0.04);' : ''}">
                        <div class="chat-avatar">${displayName.charAt(0).toUpperCase()}</div>
                        <div class="chat-info">
                            <div class="chat-name" style="${unreadCount > 0 ? 'font-weight:700;' : ''}">${displayName}</div>
                            <div class="chat-preview" style="${unreadCount > 0 ? 'color:var(--text);font-weight:500;' : ''}">${conv.last_message || 'No messages yet'}</div>
                        </div>
                        <div style="text-align:right;flex-shrink:0;">
                            <div class="chat-time">${timeAgo(conv.updated_at)}</div>
                            ${unreadCount > 0 ? '<div style="width:20px;height:20px;border-radius:50%;background:var(--teal);color:var(--bg);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:auto;margin-top:4px;">' + (unreadCount > 9 ? '9+' : unreadCount) + '</div>' : ''}
                        </div>
                    </div>`;
                }
            }

            html += '</div>';
            html += '<button class="new-chat-btn" id="newChatBtn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>';

            document.getElementById('app').innerHTML = html;

            document.querySelectorAll('[data-chat]').forEach(el => {
                el.addEventListener('click', () => {
                    const parts = el.dataset.chat.split('|');
                    navigateTo('chat-window', parts[0], parts[1]);
                });
            });

            document.getElementById('newChatBtn').addEventListener('click', () => {
                navigateTo('trade-hub');
            });
        }

        render();
    })();
    </script>
</body>
</html>
